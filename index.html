<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP Notes Search</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>ERP Notes</h2>
      <input id="searchInput" type="search" placeholder="Search module, report, task..." autocomplete="off" />
      <div class="meta"><span id="countText"></span></div>
      <div id="categoryList" class="category-list"></div>
    </aside>

    <main class="main">
      <div class="hero">
        <h1>ERP Options & Notes</h1>
        <p>User kisi bhi ERP option ko search kare aur uska note/detail dekh le.</p>
      </div>
      <div id="notesList" class="cards"></div>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
